<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Racing 3D - Multi player</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #ui-panel {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #fff;
            color: #fff;
            font-weight: bold;
            z-index: 10;
            font-size: 14px;
        }
        .ui-box span { color: #575fcf; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <div class="ui-box">VELOCIDAD: <span id="speed-val">J1: 0 | J2: 0</span> KM/H</div>
        <div class="ui-box">VUELTA: <span id="lap-val">J1: 1/3 | J2: 1/3</span></div>
        <div class="ui-box">CIRCUITO: <span id="circuit-val">1 (EXTREMO)</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="js/input.js"></script>
    <script src="js/car.js"></script>
    <script src="js/game.js"></script>

</body>
</html>
